name: Daily Stock Trend

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 22 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-stock-trend
  cancel-in-progress: true

jobs:
  collect-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install requirements
        run: pip install -r requirements.txt

      - name: Collect data and build report
        env:
          SEC_USER_AGENT: ${{ secrets.SEC_USER_AGENT || vars.SEC_USER_AGENT || 'daily-stock-trend contact@example.com' }}
          TRADINGVIEW_LIMIT: "300"
          MAX_KR_ENRICH: "60"
          SEC_13F_QUARTERS: "5"
        run: python -m src.main --root .

      - name: Commit generated data and reports
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data reports index.html
          if git diff --cached --quiet; then
            echo "No generated changes to commit."
          else
            git commit -m "Update daily stock trend report"
            git push
          fi

      - name: Upload generated files artifact
        uses: actions/upload-artifact@v4
        with:
          name: daily-stock-trend-output
          path: |
            data/processed/latest.json
            data/processed/latest.csv
            data/processed/daily_summary.csv
            reports/report.html
            reports/latest.xlsx
